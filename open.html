<!DOCTYPE html>
<html>

<head>

<title>
NTC Document Verification
</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#f1f1f1;
    font-family:Arial, sans-serif;
}


.header{

    text-align:center;
    background:white;
    padding:20px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);

}


.header h2{

    margin:0;
    color:#333;

}



.document-container{

    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;

}



iframe{

    width:80%;
    height:850px;
    border:none;
    background:white;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    border-radius:8px;

}



@media(max-width:768px){

iframe{

    width:100%;
    height:700px;

}


.document-container{

    padding:10px;

}

}


</style>

</head>


<body>


<div class="header">

<h2>
NTC Document Verification
</h2>

</div>



<div class="document-container">

<iframe id="viewer"></iframe>

</div>




<script>


const SUPABASE_URL =
"https://nnjdhqlrosjjkogolqdo.supabase.co";


const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5uamRocWxyb3NqamtvZ29scWRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ3Mjk5NzUsImV4cCI6MjEwMDMwNTk3NX0.qsFp3OxuvuvQLeTE5DRYhlfZxItfAevnZt456eFPsOg";



const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



const params =
new URLSearchParams(
window.location.search
);



const filename =
params.get("file");



if(filename){


const pdfURL =
client
.storage
.from("documents")
.getPublicUrl(filename)
.data.publicUrl;



document.getElementById("viewer").src = pdfURL;


}
else{


document.body.innerHTML =
"<h2 style='text-align:center'>Document not found</h2>";


}



</script>


</body>

</html>
